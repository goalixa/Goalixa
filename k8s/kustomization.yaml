apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - secrets.yaml
  - configmap.yaml
  - pvc.yaml
  - service.yaml
  - deployment.yaml
  # No ingress - core-api is internal only, accessed via BFF
  - middleware.yaml

images:
