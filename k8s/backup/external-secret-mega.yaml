---
# ExternalSecret for Mega Credentials from Vault
# Syncs Mega credentials stored in Vault to a Kubernetes Secret
#
# Prerequisites:
#   - External Secrets Operator installed
#   - ClusterSecretStore "vault-backend" configured
#   - Vault secret at path: goalixa/backup/mega-credentials with keys:
#     * MEGA_EMAIL
#     * MEGA_PASSWORD

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mega-credentials
  namespace: goalixa-db
  labels:
    app: goalixa-backup
    component: mega-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: mega-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app: goalixa-backup
      type: Opaque
  data:
    - secretKey: MEGA_EMAIL
      remoteRef:
        key: goalixa/backup/mega-credentials
        property: MEGA_EMAIL
    - secretKey: MEGA_PASSWORD
      remoteRef:
        key: goalixa/backup/mega-credentials
        property: MEGA_PASSWORD
