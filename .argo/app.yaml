apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: core-api
    app.kubernetes.io/part-of: goalixa
  annotations:
    argocd-image-updater.argoproj.io/image-list: harbor.goalixa.com/core-api/app
    argocd-image-updater.argoproj.io/harbor.goalixa.com/core-api/app.update-strategy: latest
    argocd-image-updater.argoproj.io/harbor.goalixa.com/core-api/app.force-update: "true"
spec:
  project: default
  source:
    repoURL: https://github.com/goalixa/Core-API.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: core-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    managedNamespaceMetadata:
      labels:
        app.kubernetes.io/part-of: goalixa
    ignoreDifferences:
      - group: apps
        kind: Deployment
        name: core-api
        jsonPointers:
          - /spec/containers/0/image
          - /spec/containers/0/env/1  # AUTH_JWT_SECRET
      - group: ""
        kind: PersistentVolumeClaim
        name: core-api-data
        jqPathExpressions:
          - .spec.volumeName
          - .spec.storageClassName
      - group: ""
        kind: Secret
        jsonPointers:
          - /data
          - /stringData
          - /metadata
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
