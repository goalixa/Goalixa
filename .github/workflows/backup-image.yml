name: Build and Push Backup Docker Image

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'Core-API/Dockerfile.backup'
      - 'Core-API/scripts/backup-to-mega.py'
      - 'Core-API/.github/workflows/backup-image.yml'
  workflow_dispatch:

env:
  REGISTRY: harbor.goalixa.com
  IMAGE_NAME: goalixa/backup

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          # Get short SHA for tag
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)

          # Set image tag based on branch
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            IMAGE_TAG="latest"
            VERSION_TAG="1.0.${{ github.run_number }}"
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            IMAGE_TAG="staging"
            VERSION_TAG="1.0.${{ github.run_number }}-staging"
          else
            IMAGE_TAG="$SHORT_SHA"
            VERSION_TAG="1.0.${{ github.run_number }}-$SHORT_SHA"
          fi

          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Core-API
          file: ./Core-API/Dockerfile.backup
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create build summary
        run: |
          cat > /tmp/build-summary.md << 'EOF'
          ## Docker Build Summary

          - **Image**: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}`
          - **Tags**:
            - `${{ steps.meta.outputs.image_tag }}`
            - `${{ steps.meta.outputs.version_tag }}`
            - `${{ steps.meta.outputs.short_sha }}`
          - **Commit**: `${{ steps.meta.outputs.short_sha }}`
          - **Branch**: `${{ github.ref_name }}`

          Image successfully built and pushed to Harbor Registry.
          EOF
          cat /tmp/build-summary.md

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Backup Docker image build failed. Check the workflow logs.'
            })
