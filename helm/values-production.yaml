# Production values for core-api
# Override default values for production environment

image:
  tag: "latest"  # Overridden by GitHub workflow

replicaCount: 3

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

namespace:
  name: core-api

env:
  LOG_LEVEL: "WARNING"
