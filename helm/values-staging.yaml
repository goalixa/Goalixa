# Staging values for core-api
# Override default values for staging environment

image:
  registry: harbor.goalixa.com
  repository: core-api-staging/app
  tag: "latest"  # Overridden by GitHub workflow

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false

namespace:
  name: core-api-staging

env:
  LOG_LEVEL: "DEBUG"
