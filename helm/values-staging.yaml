# Staging values for core-api
# Override default values for staging environment

image:
  registry: harbor.goalixa.com
  repository: core-api-staging/app
  tag: "latest"

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false

namespace:
  name: core-api-staging

persistence:
  enabled: true
  storageClass: longhorn-v2  # Match existing PVC
  accessMode: ReadWriteOnce
  size: 1Gi  # Match existing PVC

env:
  LOG_LEVEL: "DEBUG"
