services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: goalixa
      POSTGRES_USER: goalixa
      POSTGRES_PASSWORD: goalixa
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Backup volume for storing backups
      - backup_data:/backup
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goalixa -d goalixa"]
      interval: 5s
      timeout: 5s
      retries: 10
  web:
    build: .
    command: ["python", "main.py"]
    ports:
      - "5000:80"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://goalixa:goalixa@db:5432/goalixa
      - FLASK_DEBUG=1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
  # Backup service - runs periodic database backups
  backup:
    build: .
    command: ["python", "backup_db.py", "--output-dir", "/backup"]
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=goalixa
      - POSTGRES_USER=goalixa
      - POSTGRES_PASSWORD=goalixa
    volumes:
      # Mount the backup volume to store backups
      - backup_data:/backup
    depends_on:
      db:
        condition: service_healthy
    restart: "no"  # Don't restart automatically, use external scheduler if needed

volumes:
  postgres_data:
  backup_data:
    # Named volume for persistent backup storage


# Usage:
# 1. Manual backup: docker-compose run --rm backup
# 2. Scheduled backup: Use a cron job or external scheduler to run: docker-compose run --rm backup
# 3. Restore backup: docker-compose exec -i db psql -U goalixa -d goalixa < /backup/your_backup_file.sql
